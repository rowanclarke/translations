on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: rowanclarke/usfm-tools@v1

      - run: pip install awscli

      - name: Compare against deployed versions
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}

          mkdir output

          for dir in translations/*; do
            [ -d "$dir" ] || continue

            name=$(basename "$dir")

            hash=$(
              find "$dir" -type f | sort |
              while read f; do
                sha256sum "$f"
              done |
              sha256sum |
              cut -d' ' -f1
            )

            remote_hash=$(
              aws s3api head-object \
                --bucket translations \
                --key "$name.zip" \
                --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
                --query 'Metadata."content-hash"' \
                --output text \
              2>/dev/null || echo ""
            )

            echo "Comparing $hash with $remote_hash"

            if [ "$hash" = "$remote_hash" ]; then
              echo "$name unchanged"
              continue
            fi

            echo "Validating $name"

            if ! usfm-tools verify "$dir"; then
              echo "Validation failed: $name"
              continue
            fi

            if [ -f "$dir/metadata" ]; then
              echo "Adding metadata"

              contents=$(usfm-tools contents "$dir")
              echo "contents: $contents" >> "$dir/metadata"
            fi

            zip -X -r "output/$name.zip" "$dir" -x "$dir/metadata"

            meta_json="{\"content-hash\":\"$hash\""
            if [ -f "$dir/metadata" ]; then
              while IFS= read -r line; do
                key="${line%%: *}"
                value="${line#*: }"
                value=$(printf '%s' "$value" | python3 -c "import sys,json;s=sys.stdin.read();s=''.join(c if ord(c)<128 else'&#%d;'%ord(c)for c in s);print(json.dumps(s)[1:-1],end='')")
                meta_json="$meta_json,\"$key\":\"$value\""
              done < "$dir/metadata"
            fi
            meta_json="$meta_json}"

            aws s3api put-object \
              --bucket translations \
              --key "$name.zip" \
              --body "output/$name.zip" \
              --metadata "$meta_json" \
              --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          done

      - name: Update Status Badge
        run: |
          count=$(aws s3 ls s3://translations/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            | grep -c '\.zip$')
          echo "Translation count: $count"
          curl -s "https://img.shields.io/badge/translations-${count}-blue" -o status.svg
          aws s3 cp status.svg \
            s3://translations/status.svg \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --content-type image/svg+xml
